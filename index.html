<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OBSIDIAN_CORE // SEMICON_MONITOR</title>

    <!-- External Libraries: 데이터 시각화 및 스타일링 프레임워크 -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Custom Stylesheet -->
    <link rel="stylesheet" href="style.css">
</head>

<body class="bg-[#0b0e14] text-[#e5e2e1] min-h-screen p-6 font-sans selection:bg-[#9ecaff]/30">

    <!-- [SECTION 1] HEADER: 시스템 브랜드 및 네트워크 상태 정보 -->
    <header class="flex justify-between items-center mb-6 border-b border-white/10 pb-4">
        <div>
            <h1 class="text-2xl font-bold tracking-widest text-[#9ecaff]">OBSIDIAN_CORE</h1>
            <p class="text-[9px] opacity-40 tracking-[0.2em] uppercase mt-1">Real-time Semiconductor Monitoring System</p>
        </div>

        <!-- 실시간 통신 지연시간(Latency) 표시 영역 -->
        <div id="latencyDisplay" class="bg-white/5 px-3 py-1.5 rounded border border-white/5 text-xs font-mono opacity-80">
            <span class="opacity-50 text-[10px] mr-2">LATENCY</span>
            <span class="text-[#9ecaff] font-bold">-ms</span>
        </div>
    </header>

    <!-- [SECTION 2] MAIN CONTENT: 모니터링 대시보드 및 상세 분석 -->
    <main class="grid grid-cols-12 gap-6 matrix-bg">
        
        <!-- LEFT COLUMN: 128개 센서 그리드 대시보드 -->
        <section class="col-span-12 lg:col-span-8 flex flex-col gap-6">
            <div class="flex-grow">
                <div class="flex items-center justify-between mb-4">
                    <h2 class="text-sm font-semibold opacity-60 uppercase tracking-widest italic">Sensor Matrix (128 Units)</h2>
                    <span class="text-[10px] opacity-30 font-mono">STATUS: 1S_PERIOD_SYNC</span>
                </div>

                <!-- 센서 타일 컨테이너 -->
                <div id="sensorContainer"
                     class="grid grid-cols-8 gap-2 bg-white/5 p-4 rounded-xl border border-white/10 max-h-[500px] overflow-y-auto
                            custom-scroll panel-glass">
                    <!-- app.js에서 동적 생성 -->
                </div>
            </div>

            <!-- [ADD] BOTTOM LOG SECTION: 이상 징후 실시간 기록 -->
            <div class="h-[200px] flex flex-col">
                <div class="flex items-center justify-between mb-2 px-1">
                    <h2 class="text-[10px] font-bold text-red-400 uppercase tracking-[0.2em]">Anomaly Telemetry Log</h2>
                    <button onclick="document.getElementById('logContainer').innerHTML=''" class="text-[9px] opacity-30 hover:opacity-100 transition-opacity uppercase">Clear Log</button>
                </div>
                <div id="logContainer" 
                     class="flex-grow bg-black/60 rounded-xl border border-white/5 p-3 overflow-y-auto font-mono text-[11px] custom-scroll panel-glass flex flex-col-reverse gap-1">
                    <div class="opacity-20 italic text-center py-4">Waiting for telemetry alerts...</div>
                </div>
            </div>
        </section>

        <!-- RIGHT COLUMN: 선택된 센서의 상세 분석 패널 -->
        <section class="col-span-12 lg:col-span-4">
            <div id="currentSensor" class="bg-white/5 p-6 rounded-xl border border-white/10 h-full flex flex-col panel-glass">

                <!-- 센서 식별 정보 -->
                <div class="mb-8">
                    <h2 class="text-xl font-bold text-[#9ecaff] tracking-tight">- / -</h2>
                    <p class="text-[10px] opacity-40 uppercase tracking-[0.3em] mt-1">Detailed Analysis</p>
                </div>

                <!-- 실시간 수치 (이동 평균 위주) -->
                <div class="grid grid-cols-1 gap-4 mb-8">
                    <div class="bg-black/40 p-5 rounded-lg border border-white/5 flex flex-col items-center justify-center text-center">
                        <span class="text-[10px] opacity-50 uppercase tracking-widest mb-2">Current Moving Average</span>
                        <div class="flex items-baseline gap-2">
                            <div id="currentAvg" class="text-4xl font-bold font-mono text-[#9ecaff] leading-none">-</div>
                            <span id="unitText" class="text-xs opacity-30 font-mono">-</span>
                        </div>
                    </div>
                </div>

                <!-- 시계열 데이터 시각화 -->
                <div class="flex-grow min-h-[300px] relative mt-2">
                    <canvas id="chartCanvas"></canvas>
                </div>

                <!-- 시스템 진단 상태 -->
                <div class="mt-8 pt-6 border-t border-white/5 flex items-center justify-between">
                    <div>
                        <span class="text-[10px] opacity-40 uppercase block mb-1 tracking-widest">Diagnostic</span>
                        <div id="currentStatus" class="text-sm font-bold tracking-tighter">-</div>
                    </div>
                    <div id="statusIndicator" class="w-3 h-3 rounded-full bg-white/10 shadow-[0_0_10px_rgba(255,255,255,0.1)]"></div>
                </div>
            </div>
        </section>

    </main>

    <!-- [SECTION 3] SCRIPTS: 애플리케이션 비즈니스 로직 -->
    <script src="app.js"></script>

</body>
</html>
